<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backlog // Clear List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0b0e;
    --panel: #13151a;
    --panel-hi: #191c22;
    --line: #23262e;
    --text: #f1f2f4;
    --dim: #7b8190;
    --tier1: #4fd67a;
    --tier2: #5fb8e0;
    --tier3: #e0b84f;
    --tier4: #e08a4f;
    --tier5: #b073e0;
    --tier6: #e0524f;
    --buy1: #4fd6c4;
    --buy2: #e07a9c;
    --buy3: #7a9ce0;
    --buy4: #e0c44f;
    --buy5: #9c7ae0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 32px 16px 60px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
  }

  .wrap { max-width: 720px; margin: 0 auto; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    text-decoration: none;
    margin-bottom: 18px;
  }
  .back-link:hover { color: var(--text); }

  header { margin-bottom: 28px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 18px 0;
    letter-spacing: 0.5px;
  }

  .progress-shell {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-count { font-size: 22px; font-weight: 700; }
  .progress-count span { color: var(--dim); font-size: 14px; font-weight: 500; }
  .progress-pct { font-size: 13px; color: var(--dim); font-weight: 600; }

  .bar-track {
    height: 10px;
    background: #1c1f26;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
  }

  .bar-seg { height: 100%; transition: width 0.4s ease; }

  .section-title {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 40px 0 18px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .tier { margin-bottom: 22px; }

  .tier-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-left: 2px;
    flex-wrap: wrap;
  }

  .tier-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .tier-title { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .tier-sub { font-size: 12px; color: var(--dim); font-weight: 500; }
  .tier-count { margin-left: auto; font-size: 12px; color: var(--dim); font-weight: 600; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 3px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s ease;
  }

  .item:hover { background: var(--panel-hi); }
  .item + .item { border-top: 1px solid var(--line); }

  .box {
    width: 19px;
    height: 19px;
    border-radius: 5px;
    border: 2px solid var(--line);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }

  .box svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.6); transition: all 0.15s ease; }
  .item.done .box svg { opacity: 1; transform: scale(1); }

  .name { font-size: 14.5px; font-weight: 500; color: var(--text); transition: color 0.15s ease, opacity 0.15s ease; }

  .item.done .name {
    color: var(--dim);
    opacity: 0.65;
    text-decoration: line-through;
    text-decoration-color: var(--dim);
    text-decoration-thickness: 1.5px;
  }

  footer { text-align: center; color: var(--dim); font-size: 12px; margin-top: 30px; }

  .reset-btn {
    display: block;
    margin: 30px auto 0;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .reset-btn:hover { border-color: var(--tier6); color: var(--tier6); }

  /* ===== shared polish ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  body { animation: fadeInUp 0.35s ease; }
  body {
    padding-top: calc(env(safe-area-inset-top, 0px));
    padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }
  * { scrollbar-width: thin; scrollbar-color: #262626 transparent; }

  button, a.card, .card {
    transition: transform 0.12s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.96); }
  a.card:active, .card:active { transform: scale(0.98); }

  .toast-wrap {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #eee;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { border-color: #e2574f; color: #f2a09c; }

</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html">&#8592; Hub</a>

  <header>
    <div class="eyebrow">Backlog // Clear Order</div>
    <h1>Play This, Then That</h1>
    <div class="progress-shell">
      <div class="progress-top">
        <div class="progress-count" id="progressCount">0 <span id="progressTotal">/ 0 cleared</span></div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="bar-track" id="barTrack"></div>
    </div>
  </header>

  <div class="section-title">To Play</div>
  <div id="tiers"></div>

  <div class="section-title">To Buy</div>
  <div id="buyTiers"></div>

  <button class="reset-btn" id="resetBtn">Reset all progress</button>

  <footer>Tap a title to mark it done. Progress saves automatically to this browser.</footer>
</div>

<script>
function showToast(msg, isError) {
  let wrap = document.getElementById('toastWrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'toastWrap';
    wrap.className = 'toast-wrap';
    document.body.appendChild(wrap);
  }
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' err' : '');
  t.textContent = msg;
  wrap.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 250);
  }, 1700);
}

const TIERS = [
  { id: 't1', title: 'Tier 1', sub: 'Quick wins — build the habit', color: 'var(--tier1)',
    games: ['Portal 2', 'Still Wakes the Deep', 'Detroit: Become Human', 'Labyrinthine'] },
  { id: 't2', title: 'Tier 2', sub: 'Story-driven, moderate difficulty', color: 'var(--tier2)',
    games: ['Resident Evil 2', 'Resident Evil 3', 'Resident Evil Village', 'Resident Evil 4', 'UNCHARTED: Legacy of Thieves Collection', 'Tomb Raider (2013)', 'Rise of the Tomb Raider', 'Shadow of the Tomb Raider'] },
  { id: 't3', title: 'Tier 3', sub: 'Stepping up the difficulty', color: 'var(--tier3)',
    games: ['The Evil Within', 'The Evil Within 2', 'RESIDENT EVIL RESISTANCE', 'Hollow Knight', 'Devil May Cry 5', 'God of War (2018)'] },
  { id: 't4', title: 'Tier 4', sub: 'Big open-world commitments', color: 'var(--tier4)',
    games: ['Days Gone', 'Ghost of Tsushima', 'Dying Light 2', 'Red Dead Redemption 2', 'Cyberpunk 2077'] },
  { id: 't5', title: 'Tier 5', sub: 'RPG deep dives', color: 'var(--tier5)',
    games: ['The Witcher: Enhanced Edition', 'The Witcher 2', 'The Witcher 3: Wild Hunt'] },
  { id: 't6', title: 'Tier 6', sub: 'Hardest — save for real free time', color: 'var(--tier6)',
    games: ['Lords of the Fallen', 'Sekiro: Shadows Die Twice', 'Hollow Knight: Silksong', 'ELDEN RING'] },
  { id: 't7', title: 'Co-op', sub: 'Whenever a friend is free — no fixed slot', color: 'var(--dim)',
    games: ['Split Fiction'] }
];

const BUY_TIERS = [
  { id: 'b1', title: 'September 2026', sub: 'Planned buys', color: 'var(--buy1)',
    games: ["The Last of Us Part I", "Hellblade: Senua's Sacrifice", "Mirror's Edge"] },
  { id: 'b2', title: 'Halloween / Black Friday', sub: 'Optional, if the sale is good', color: 'var(--buy2)',
    games: ["No Man's Sky", 'Little Nightmares', 'Skyrim'] },
  { id: 'b3', title: 'Winter Sale', sub: 'Planned buys', color: 'var(--buy3)',
    games: ["God of War Ragnarök", "Marvel's Spider-Man: Miles Morales"] },
  { id: 'b4', title: 'March 2027 Sale', sub: 'Planned buys', color: 'var(--buy4)',
    games: ["Marvel's Spider-Man 2", "Senua's Saga: Hellblade II"] },
  { id: 'b5', title: 'Late Buys', sub: 'Expensive — wait for a deep discount', color: 'var(--buy5)',
    games: ['Resident Evil 9', 'Black Myth: Wukong', 'Sea of Thieves', 'Little Nightmares II', 'Little Nightmares III', 'A Plague Tale: Innocence', "Assassin's Creed IV: Black Flag"] }
];

const STORAGE_KEY = 'backlog_progress';
const STREAK_KEY = 'hub_streak_days';
let state = {};

function recordActivity() {
  try {
    const days = JSON.parse(localStorage.getItem(STREAK_KEY) || '[]');
    const today = new Date().toISOString().slice(0,10);
    if (days[days.length - 1] !== today) {
      days.push(today);
      localStorage.setItem(STREAK_KEY, JSON.stringify(days));
    }
  } catch (e) { /* non-critical */ }
}

function slug(prefix, name) {
  return prefix + '::' + name.replace(/\s+/g, '_');
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : {};
  } catch (e) {
    state = {};
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    // storage unavailable, progress just won't persist this session
  }
}

function checkSvg() {
  return '<svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#0a0b0e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function renderGroup(containerId, tiers, prefix) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  let totalDone = 0;
  let totalGames = 0;

  tiers.forEach(tier => {
    totalGames += tier.games.length;
    const tierDone = tier.games.filter(g => state[slug(prefix + tier.id, g)]).length;
    totalDone += tierDone;

    const tierEl = document.createElement('div');
    tierEl.className = 'tier';
    tierEl.innerHTML = `
      <div class="tier-head">
        <div class="tier-dot" style="background:${tier.color}"></div>
        <div class="tier-title" style="color:${tier.color}">${tier.title}</div>
        <div class="tier-sub">${tier.sub}</div>
        <div class="tier-count">${tierDone}/${tier.games.length}</div>
      </div>
      <div class="card">
        ${tier.games.map(g => {
          const key = slug(prefix + tier.id, g);
          const done = !!state[key];
          return `<div class="item ${done ? 'done' : ''}" data-key="${key}">
            <div class="box" style="${done ? `background:${tier.color};border-color:${tier.color}` : ''}">${checkSvg()}</div>
            <div class="name">${g}</div>
          </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(tierEl);
  });

  container.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.getAttribute('data-key');
      const nameEl = el.querySelector('.name');
      const title = nameEl ? nameEl.textContent : '';
      state[key] = !state[key];
      if (state[key]) recordActivity();
      saveState();
      renderAll();
      showToast(state[key] ? (title + ' cleared') : (title + ' unmarked'));
    });
  });

  return { totalDone, totalGames };
}

function renderAll() {
  const playStats = renderGroup('tiers', TIERS, 'play_');
  renderGroup('buyTiers', BUY_TIERS, 'buy_');

  document.getElementById('progressCount').innerHTML = `${playStats.totalDone} <span id="progressTotal">/ ${playStats.totalGames} cleared</span>`;
  const pct = playStats.totalGames ? Math.round((playStats.totalDone / playStats.totalGames) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';

  const barTrack = document.getElementById('barTrack');
  barTrack.innerHTML = '';
  TIERS.forEach(tier => {
    const tierDone = tier.games.filter(g => state[slug('play_' + tier.id, g)]).length;
    const segWidth = (tierDone / playStats.totalGames) * 100;
    if (segWidth > 0) {
      const seg = document.createElement('div');
      seg.className = 'bar-seg';
      seg.style.width = segWidth + '%';
      seg.style.background = tier.color;
      barTrack.appendChild(seg);
    }
  });
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all progress? This clears every checked item.')) {
    state = {};
    saveState();
    renderAll();
    showToast('Progress reset');
  }
});

(function init() {
  loadState();
  renderAll();
})();
</script>
</body>
</html>
