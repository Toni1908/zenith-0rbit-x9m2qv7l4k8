<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zenith">
<link rel="icon" type="image/png" sizes="512x512" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Zenith</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #080808;
    --surface: #101010;
    --border:  #1c1c1c;
    --text:    #e0e0e0;
    --muted:   #444;
    --c-STR:    #f87171;
    --c-END:    #4ade80;
    --c-INT:    #60a5fa;
    --c-BLD:    #facc15;
    --c-SPIRIT: #c084fc;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 56px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .overall-rank-badge {
    display: inline-block;
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .overall-title {
    font-size: 12px;
    color: #666;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── STAT CARDS ── */
  .stats-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .stat-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    min-width: 48px;
  }
  .stat-full {
    font-size: 12px;
    color: #555;
    font-weight: 400;
  }
  .stat-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .stat-right-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .stat-rank-title {
    font-size: 10px;
    letter-spacing: 0.4px;
    color: #666;
  }
  .stat-rank-label {
    font-size: 16px;
    font-weight: 700;
  }
  .stat-ep-label {
    font-size: 11px;
    color: #444;
  }
  .bar-bg {
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* ── STAT ACTIONS ── */
  .stat-add-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .add-ep-btn {
    font-family: 'Exo 2', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border-radius: 5px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-ep-btn:hover  { opacity: 0.7; }
  .add-ep-btn:active { opacity: 0.4; }
  .reset-stat-btn {
    font-family: 'Exo 2', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    border-radius: 5px;
    border: 1px solid #262626;
    background: transparent;
    color: #555;
    cursor: pointer;
    margin-left: auto;
  }
  .reset-stat-btn:hover { border-color: #444; color: #888; }
  .spirit-input {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #252525;
    border-radius: 5px;
    color: #c084fc;
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 10px;
    outline: none;
    width: 0;
  }
  .spirit-input::placeholder { color: #3a3a3a; font-weight: 400; }
  .spirit-input:focus { border-color: #5b21b6; }
  /* hide number input arrows */
  .spirit-input::-webkit-outer-spin-button,
  .spirit-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .spirit-input[type=number] { -moz-appearance: textfield; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ── QUEST CARD ── */
  .quest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    min-height: 110px;
    margin-bottom: 10px;
  }
  .quest-empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 70px;
    font-size: 14px;
    color: #2e2e2e;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-style: italic;
  }
  .quest-category-row {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .quest-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .quest-desc {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .rewards-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .reward-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .reward-state {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    min-width: 52px;
  }
  .reward-sep {
    color: #2a2a2a;
  }
  .reward-ep {
    color: #888;
  }
  .resolved-badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    background: #0e0e0e;
    border: 1px solid #222;
  }

  /* ── ACTION BUTTONS ── */
  .quest-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .action-btn {
    flex: 1;
    padding: 13px 8px;
    border: 1px solid;
    border-radius: 6px;
    font-family: 'Exo 2', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    transition: opacity 0.15s;
  }
  .action-btn:hover  { opacity: 0.75; }
  .action-btn:active { opacity: 0.5; }
  .action-btn:disabled { opacity: 0.2; cursor: default; }
  .btn-done  { color: #4ade80; border-color: #4ade8028; }
  .btn-push  { color: #facc15; border-color: #facc1528; }
  .btn-miss  { color: #f87171; border-color: #f8717128; }

  /* ── ROLL BUTTON ── */
  .roll-btn {
    width: 100%;
    padding: 15px;
    background: #0c0717;
    border: 1px solid #5b21b6;
    color: #a78bfa;
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .roll-btn:hover  { background: #150c2a; border-color: #7c3aed; }
  .roll-btn:active { background: #1e0f3a; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #ccc;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
  .toast.rankup {
    background: #0e0820;
    border-color: #7c3aed;
    color: #c084fc;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 14px 24px;
    box-shadow: 0 0 24px #7c3aed55;
  }
</style>
</head>
<body>

<!-- HEADER -->
<a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#555;text-decoration:none;margin-bottom:14px;">&#8592; Hub</a>
<div class="header">
  <div class="header-eyebrow">⚔ Zenith</div>
  <div class="overall-rank-badge" id="overall-rank">F</div>
  <div class="overall-title" id="overall-title">The Unawakened</div>
</div>

<!-- STATS -->
<div class="section-label">Player Stats</div>
<div class="stats-grid" id="stats-grid"></div>
<div style="text-align:right;margin:-4px 0 4px;">
  <button class="reset-stat-btn" style="margin-left:0;" onclick="resetAllStats()">Reset all stats</button>
</div>

<div class="divider"></div>

<!-- QUEST -->
<div class="section-label">Dungeon Raid</div>

<div class="quest-card" id="quest-card">
  <div class="quest-empty-state" id="quest-empty">Dungeon Sealed</div>
  <div id="quest-content" style="display:none">
    <div class="quest-category-row" id="quest-category"></div>
    <div class="quest-name" id="quest-name"></div>
    <div class="quest-desc" id="quest-desc"></div>
    <div class="rewards-row" id="quest-rewards"></div>
    <div id="quest-resolved-badge" style="display:none" class="resolved-badge"></div>
  </div>
</div>

<button class="roll-btn" onclick="rollQuest()">Roll Dungeon Raid</button>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────

const RANKS = [
  { rank: 'F',    min: 0,     max: 399,      value: 1,  title: 'Unawakened'   },
  { rank: 'E',    min: 400,   max: 1099,     value: 2,  title: 'Initiate'     },
  { rank: 'D',    min: 1100,  max: 2099,     value: 3,  title: 'Seeker'       },
  { rank: 'C',    min: 2100,  max: 3399,     value: 4,  title: 'Hunter'       },
  { rank: 'B',    min: 3400,  max: 4999,     value: 5,  title: 'Veteran'      },
  { rank: 'A',    min: 5000,  max: 6899,     value: 6,  title: 'Elite'        },
  { rank: 'S',    min: 6900,  max: 8799,     value: 7,  title: 'Sovereign'    },
  { rank: 'SS',   min: 8800,  max: 10699,    value: 8,  title: 'Apex'         },
  { rank: 'SSS',  min: 10700, max: 12699,    value: 9,  title: 'Legendary' },
  { rank: 'SSS+', min: 12700, max: Infinity, value: 10, title: 'Transcendent' },
];

const OVERALL_TITLES = {
  1: 'The Unawakened',
  2: 'Shadow Initiate',
  3: 'Iron Challenger',
  4: 'Dungeon Walker',
  5: 'Gate Breaker',
  6: 'Void Hunter',
  7: 'Sovereign Raider',
  8: 'Monarch of Depths',
  9: 'The Absolute',
  10: 'The Absolute',
};

const STAT_META = {
  STR:    { full: 'Strength',  color: '#f87171' },
  END:    { full: 'Endurance', color: '#4ade80' },
  INT:    { full: 'Intellect', color: '#60a5fa' },
  BLD:    { full: 'Build',     color: '#facc15' },
  SPIRIT: { full: 'Spirit',    color: '#c084fc' },
};

const QUEST_POOL = [
  {
    name: 'The Bicep Gauntlet',
    desc: 'Max set for Bicep workout',
    category: ['BLD'],
    rewards: {
      complete: { BLD: 10 },
      push:     { SPIRIT: 5  },
      miss:     { SPIRIT: -3 },
    },
  },{
    name: 'Iron Fist',
    desc: 'Max push-up set — go until failure.',
    category: ['STR'],
    rewards: {
      complete: { STR: 10 },
      push:     { SPIRIT: 5  },
      miss:     { SPIRIT: -3 },
    },
  },
  {
    name: 'Ground Zero',
    desc: 'Sit-ups + Squats + Plank hold. No skipping any.',
    category: ['STR', 'END'],
    rewards: {
      complete: { STR: 10, END: 10 },
      push:     { SPIRIT: 5 },
      miss:     { SPIRIT: -3 },
    },
  },
  {
    name: 'Body Architect',
    desc: 'Calisthenics skill practice — form over reps.',
    category: ['STR', 'END'],
    rewards: {
      complete: { STR: 10, END: 10 },
      push:     { SPIRIT: 5 },
      miss:     { SPIRIT: -3 },
    },
  },
  {
    name: 'Still Mind',
    desc: 'Meditation / no-phone wind-down before sleep.',
    category: ['SPIRIT'],
    rewards: {
      complete: { SPIRIT: 20 },
      push:     { SPIRIT: 3  },
      miss:     { SPIRIT: -4 },
    },
  },
];

// ─── STORAGE ─────────────────────────────────────────────────────────────────

const STATS_KEY = 'zenith_stats';
const QUEST_KEY = 'zenith_special_quest';
const DEFAULT_STATS = { STR: 0, END: 0, INT: 0, BLD: 0, SPIRIT: 0 };

function loadStats() {
  try {
    const s = localStorage.getItem(STATS_KEY);
    return s ? { ...DEFAULT_STATS, ...JSON.parse(s) } : { ...DEFAULT_STATS };
  } catch { return { ...DEFAULT_STATS }; }
}

function saveStats(stats) {
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function loadQuest() {
  try {
    const q = localStorage.getItem(QUEST_KEY);
    return q ? JSON.parse(q) : null;
  } catch { return null; }
}

function saveQuest(quest) {
  localStorage.setItem(QUEST_KEY, JSON.stringify(quest));
}

// ─── RANK UTILS ──────────────────────────────────────────────────────────────

function getRankData(ep) {
  for (let i = RANKS.length - 1; i >= 0; i--) {
    if (ep >= RANKS[i].min) return RANKS[i];
  }
  return RANKS[0];
}

function getBarProgress(ep) {
  const r = getRankData(ep);
  if (r.rank === 'SSS+') return 1;
  return (ep - r.min) / (r.max - r.min + 1);
}

function getOverallRank(stats) {
  const vals = Object.keys(STAT_META).map(s => getRankData(stats[s] || 0).value);
  const avg  = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  return RANKS.find(r => r.value === avg) || RANKS[0];
}

// ─── RENDER STATS ─────────────────────────────────────────────────────────────

function renderStats() {
  const stats = loadStats();
  const grid  = document.getElementById('stats-grid');
  grid.innerHTML = '';

  Object.entries(STAT_META).forEach(([key, meta]) => {
    const ep       = stats[key] || 0;
    const rankData = getRankData(ep);
    const progress = getBarProgress(ep);

    const isSpirit = key === 'SPIRIT';

    const actionHTML = isSpirit
      ? `<div class="stat-add-row">
           <input class="spirit-input" id="spirit-input" type="number" placeholder="e.g. +5 or −3" />
           <button class="add-ep-btn" style="color:${meta.color};border-color:${meta.color}33" onclick="logSpirit()">Log</button>
           <button class="reset-stat-btn" onclick="resetStat('${key}')">Reset</button>
         </div>`
      : `<div class="stat-add-row">
           <button class="add-ep-btn" style="color:${meta.color};border-color:${meta.color}33" onclick="addEP('${key}', 10)">+ 10 EP</button>
           <button class="reset-stat-btn" onclick="resetStat('${key}')">Reset</button>
         </div>`;

    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `
      <div class="stat-row">
        <div class="stat-left">
          <span class="stat-tag" style="color:${meta.color}">${key}</span>
          <span class="stat-full">${meta.full}</span>
        </div>
        <div class="stat-right">
          <div class="stat-right-top">
            <span class="stat-rank-label" style="color:${meta.color}">${rankData.rank}</span>
            <span class="stat-ep-label">${ep.toLocaleString()} EP</span>
          </div>
          <div class="stat-rank-title">${rankData.title}</div>
        </div>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${Math.min(progress * 100, 100).toFixed(1)}%;background:${meta.color}22;box-shadow:0 0 6px ${meta.color}66;border-right:2px solid ${meta.color}"></div>
      </div>
      ${actionHTML}
    `;
    grid.appendChild(card);
  });

  // Overall
  const overall = getOverallRank(stats);
  document.getElementById('overall-rank').textContent  = overall.rank;
  document.getElementById('overall-title').textContent = OVERALL_TITLES[overall.value] || 'The Unawakened';
}

// ─── RENDER QUEST ─────────────────────────────────────────────────────────────

function renderQuest(quest) {
  const emptyEl   = document.getElementById('quest-empty');
  const contentEl = document.getElementById('quest-content');
  const badgeEl   = document.getElementById('quest-resolved-badge');

  if (!quest || quest.sealed) {
    emptyEl.style.display   = 'flex';
    emptyEl.textContent     = 'Dungeon Sealed';
    contentEl.style.display = 'none';
    return;
  }

  emptyEl.style.display   = 'none';
  contentEl.style.display = 'block';

  // Category
  const catHTML = quest.category
    .map(s => `<span style="color:${STAT_META[s].color}">${s}</span>`)
    .join(' <span style="color:#333">+</span> ');
  document.getElementById('quest-category').innerHTML = `⚔ ${catHTML}`;
  document.getElementById('quest-name').textContent   = quest.name;
  document.getElementById('quest-desc').textContent   = quest.desc;

  // Rewards
  const rewardsEl = document.getElementById('quest-rewards');
  rewardsEl.innerHTML = '';

  const stateConfig = {
    complete: { label: '✓ DONE', color: '#4ade80' },
    push:     { label: '↷ PUSH', color: '#facc15' },
    miss:     { label: '✕ MISS', color: '#f87171' },
  };

  Object.entries(stateConfig).forEach(([state, cfg]) => {
    const reward  = quest.rewards[state];
    const entries = Object.entries(reward);
    const epText  = entries.length
      ? entries.map(([stat, ep]) => {
          const sign  = ep >= 0 ? '+' : '';
          const color = ep < 0 ? '#f87171' : STAT_META[stat].color;
          return `<span style="color:${color}">${sign}${ep} ${stat}</span>`;
        }).join('  ')
      : '<span style="color:#333">0 EP</span>';

    const line = document.createElement('div');
    line.className = 'reward-line';
    line.innerHTML = `
      <span class="reward-state" style="color:${cfg.color}">${cfg.label}</span>
      <span class="reward-sep">→</span>
      <span class="reward-ep">${epText}</span>
    `;
    rewardsEl.appendChild(line);
  });

  // Resolved badge
  if (quest.resolved) {
    const cfg = stateConfig[quest.resolved];
    badgeEl.style.display     = 'inline-block';
    badgeEl.style.color       = cfg.color;
    badgeEl.style.borderColor = cfg.color + '33';
    badgeEl.textContent       = `Resolved: ${cfg.label}`;
  } else {
    badgeEl.style.display = 'none';
  }
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

function addEP(stat, amount) {
  const stats    = loadStats();
  const oldRank  = getRankData(stats[stat] || 0).rank;
  stats[stat]    = Math.max(0, (stats[stat] || 0) + amount);
  const newRank  = getRankData(stats[stat]).rank;
  saveStats(stats);
  renderStats();
  if (newRank !== oldRank) {
    showToast(`⬆ ${stat} RANK UP  ${oldRank} → ${newRank}`, true);
  } else {
    showToast(`+${amount} EP → ${stat}`);
  }
}

function resetStat(stat) {
  if (!confirm(`Reset ${stat} to 0 EP?`)) return;
  const stats  = loadStats();
  stats[stat]  = 0;
  saveStats(stats);
  renderStats();
  showToast(`${stat} reset to 0 EP`);
}

function resetAllStats() {
  if (!confirm('Reset every stat to 0 EP? This affects your overall rank too.')) return;
  saveStats({ ...DEFAULT_STATS });
  renderStats();
  showToast('All stats reset to 0 EP');
}

function logSpirit() {
  const input    = document.getElementById('spirit-input');
  const val      = parseInt(input.value, 10);
  if (isNaN(val) || val === 0) return;
  const stats    = loadStats();
  const oldRank  = getRankData(stats.SPIRIT || 0).rank;
  stats.SPIRIT   = Math.max(0, (stats.SPIRIT || 0) + val);
  const newRank  = getRankData(stats.SPIRIT).rank;
  saveStats(stats);
  input.value = '';
  renderStats();
  if (newRank !== oldRank && val > 0) {
    showToast(`⬆ SPIRIT RANK UP  ${oldRank} → ${newRank}`, true);
  } else {
    showToast(val > 0 ? `+${val} SPIRIT — Resolve logged` : `${val} SPIRIT — Missed`);
  }
}

function rollQuest() {
  const roll = Math.floor(Math.random() * 13) + 1; // 1 to 13
  if (roll % 2 !== 0) {
    // Odd — dungeon sealed
    saveQuest({ sealed: true, roll });
    renderQuest({ sealed: true, roll });
    showToast('Dungeon Sealed');
    return;
  }
  // Even — pull a quest
  const idx   = Math.floor(Math.random() * QUEST_POOL.length);
  const quest = { ...QUEST_POOL[idx], resolved: null, roll };
  saveQuest(quest);
  renderQuest(quest);
  showToast(`Rolled ${roll} — Raid Unlocked`);
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

let _toastTimer;
function showToast(msg, isRankUp = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('show', 'rankup');
  void el.offsetWidth; // force reflow for re-animation
  el.classList.add('show');
  if (isRankUp) el.classList.add('rankup');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show', 'rankup'), isRankUp ? 3500 : 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderStats();
renderQuest(loadQuest());
</script>
