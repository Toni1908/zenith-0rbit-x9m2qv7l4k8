<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #080808;
    --surface: #101010;
    --border:  #1c1c1c;
    --text:    #e0e0e0;
    --muted:   #444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 16px;
  }
  .wrap { width: 100%; max-width: 480px; }

  .header {
    text-align: center;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header-name {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .card:hover {
    border-color: #333;
    background: #141414;
  }
  .card-icon {
    width: 42px;
    height: 42px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .icon-zenith    { background: rgba(192,132,252,0.14); color: #c084fc; }
  .icon-cache     { background: rgba(74,222,128,0.14);  color: #4ade80; }
  .icon-backlog   { background: rgba(96,165,250,0.14);  color: #60a5fa; }
  .icon-split     { background: rgba(248,113,113,0.14); color: #f87171; }
  .icon-backup    { background: rgba(224,184,79,0.14);  color: #e0b84f; }

  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .card-sub {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
  }
  .card-arrow {
    font-size: 18px;
    color: #444;
  }

  .card.disabled {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }
  .soon-badge {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #1a1a1a;
    color: #666;
    padding: 3px 8px;
    border-radius: 5px;
    flex-shrink: 0;
  }

  .footer {
    text-align: center;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 36px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-eyebrow">Systems</div>
    <div class="header-name">Maddy</div>
  </div>

  <a class="card" href="zenith.html">
    <div class="card-icon icon-zenith">Z</div>
    <div class="card-body">
      <div class="card-title">Zenith</div>
      <div class="card-sub">Quests, stats, rank progression</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="cache.html">
    <div class="card-icon icon-cache">₹</div>
    <div class="card-body">
      <div class="card-title">Cache</div>
      <div class="card-sub">Monthly income and spending ledger</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="backlog.html">
    <div class="card-icon icon-backlog">B</div>
    <div class="card-body">
      <div class="card-title">Backlog</div>
      <div class="card-sub">Game queue and completion tracker</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="split.html">
    <div class="card-icon icon-split">S</div>
    <div class="card-body">
      <div class="card-title">Split</div>
      <div class="card-sub">Weekly workout plan and log</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="backup.html">
    <div class="card-icon icon-backup">↓</div>
    <div class="card-body">
      <div class="card-title">Backup</div>
      <div class="card-sub">Export or restore all data at once</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <div class="footer">one system at a time</div>
</div>
</body>
</html>
