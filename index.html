<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #080808;
    --surface: #101010;
    --border:  #1c1c1c;
    --text:    #e0e0e0;
    --muted:   #444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 16px;
  }
  .wrap { width: 100%; max-width: 480px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .header-center { text-align: center; }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
  }
  .settings-link {
    position: absolute;
    right: 0;
    top: 0;
    font-size: 18px;
    color: #444;
    text-decoration: none;
  }
  .settings-link:hover { color: #888; }

  .streak-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #141414, #0f0f0f);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }
  .streak-left { display: flex; align-items: center; gap: 10px; }
  .streak-flame { font-size: 20px; }
  .streak-count { font-size: 20px; font-weight: 800; }
  .streak-label { font-size: 11px; color: #777; margin-top: 1px; }
  .streak-status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
  }
  .streak-status.active { background: rgba(74,222,128,0.12); color: #4ade80; }
  .streak-status.pending { background: #1a1a1a; color: #777; }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin: 22px 0 10px;
  }
  .section-label:first-of-type { margin-top: 0; }

  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .card:hover {
    border-color: #333;
    background: #141414;
  }
  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .icon-zenith    { background: rgba(192,132,252,0.14); color: #c084fc; }
  .icon-cache     { background: rgba(74,222,128,0.14);  color: #4ade80; }
  .icon-backlog   { background: rgba(96,165,250,0.14);  color: #60a5fa; }
  .icon-split     { background: rgba(248,113,113,0.14); color: #f87171; }
  .icon-backup    { background: rgba(224,184,79,0.14);  color: #e0b84f; }

  .card-body { flex: 1; min-width: 0; }
  .card-title-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .card-title {
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .card-snippet {
    font-size: 13px;
    font-weight: 600;
  }
  .card-sub {
    font-size: 11.5px;
    color: #666;
    margin-top: 2px;
  }
  .card-arrow {
    font-size: 17px;
    color: #444;
    flex-shrink: 0;
  }

  .card.disabled {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }
  .soon-badge {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #1a1a1a;
    color: #666;
    padding: 3px 8px;
    border-radius: 5px;
    flex-shrink: 0;
  }

  .footer {
    text-align: center;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 30px;
  }

  /* ===== shared polish ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  body { animation: fadeInUp 0.35s ease; }
  body {
    padding-top: calc(env(safe-area-inset-top, 0px));
    padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }
  * { scrollbar-width: thin; scrollbar-color: #262626 transparent; }

  button, a.card, .card {
    transition: transform 0.12s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.96); }
  a.card:active, .card:active { transform: scale(0.98); }

  .toast-wrap {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #eee;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { border-color: #e2574f; color: #f2a09c; }

</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-center">
      <div class="header-eyebrow">Systems</div>
      <div class="header-name">Maddy</div>
    </div>
    <a class="settings-link" href="settings.html" title="Settings">&#9881;</a>
  </div>

  <div class="streak-card">
    <div class="streak-left">
      <div class="streak-flame">🔥</div>
      <div>
        <div class="streak-count" id="streakCount">0 days</div>
        <div class="streak-label">active streak</div>
      </div>
    </div>
    <div class="streak-status" id="streakStatus">—</div>
  </div>

  <div class="section-label">Systems</div>

  <a class="card" href="zenith.html">
    <div class="card-icon icon-zenith">Z</div>
    <div class="card-body">
      <div class="card-title-row">
        <div class="card-title">Zenith</div>
      </div>
      <div class="card-sub" id="zenithSnippet">Quests, stats, rank progression</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="cache.html">
    <div class="card-icon icon-cache">₹</div>
    <div class="card-body">
      <div class="card-title-row">
        <div class="card-title">Cache</div>
        <div class="card-snippet" id="cacheSnippet"></div>
      </div>
      <div class="card-sub">This month's closing balance</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="split.html">
    <div class="card-icon icon-split">S</div>
    <div class="card-body">
      <div class="card-title-row">
        <div class="card-title">Split</div>
      </div>
      <div class="card-sub" id="splitSnippet">Weekly workout plan and log</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <a class="card" href="backlog.html">
    <div class="card-icon icon-backlog">B</div>
    <div class="card-body">
      <div class="card-title-row">
        <div class="card-title">Backlog</div>
        <div class="card-snippet" id="backlogSnippet"></div>
      </div>
      <div class="card-sub">Game queue and completion tracker</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <div class="section-label">Utilities</div>

  <a class="card" href="backup.html">
    <div class="card-icon icon-backup">↓</div>
    <div class="card-body">
      <div class="card-title-row">
        <div class="card-title">Backup</div>
      </div>
      <div class="card-sub">Export or restore all data at once</div>
    </div>
    <div class="card-arrow">&#8250;</div>
  </a>

  <div class="footer">one system at a time</div>
</div>

<script>
function showToast(msg, isError) {
  let wrap = document.getElementById('toastWrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'toastWrap';
    wrap.className = 'toast-wrap';
    document.body.appendChild(wrap);
  }
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' err' : '');
  t.textContent = msg;
  wrap.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 250);
  }, 1700);
}

const STREAK_KEY = 'hub_streak_days';

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function renderStreak() {
  let days = [];
  try {
    days = JSON.parse(localStorage.getItem(STREAK_KEY) || '[]');
  } catch (e) { days = []; }

  const daySet = new Set(days);
  const today = todayStr();
  const activeToday = daySet.has(today);

  // count consecutive days ending today, or ending yesterday if today not yet active
  let count = 0;
  let cursor = new Date();
  if (!activeToday) cursor.setDate(cursor.getDate() - 1);

  while (true) {
    const key = cursor.toISOString().slice(0,10);
    if (daySet.has(key)) {
      count++;
      cursor.setDate(cursor.getDate() - 1);
    } else {
      break;
    }
  }

  document.getElementById('streakCount').textContent = count + (count === 1 ? ' day' : ' days');
  const statusEl = document.getElementById('streakStatus');
  if (activeToday) {
    statusEl.textContent = 'Active today';
    statusEl.className = 'streak-status active';
  } else {
    statusEl.textContent = 'Nothing logged today';
    statusEl.className = 'streak-status pending';
  }
}

function renderCacheSnippet() {
  const el = document.getElementById('cacheSnippet');
  try {
    const entries = JSON.parse(localStorage.getItem('cache_entries') || '[]');
    let settings = { currency: '₹' };
    try {
      const rawSettings = localStorage.getItem('hub_settings');
      if (rawSettings) settings = JSON.parse(rawSettings);
    } catch (e) {}
    const currency = settings.currency || '₹';

    if (!entries.length) { el.textContent = ''; return; }

    const now = new Date();
    const cutoff = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    let balance = 0;
    entries.forEach(e => {
      if (e.date.slice(0,7) <= cutoff) {
        balance += e.type === 'credit' ? e.amount : -e.amount;
      }
    });
    const rounded = Math.abs(Math.round(balance * 100) / 100);
    const sign = balance < 0 ? '−' : '';
    el.textContent = sign + currency + rounded.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    el.style.color = balance < 0 ? '#e2574f' : '#4ade80';
  } catch (e) {
    el.textContent = '';
  }
}

function renderSplitSnippet() {
  const el = document.getElementById('splitSnippet');
  try {
    const plan = JSON.parse(localStorage.getItem('workout_plan') || '{}');
    const log = JSON.parse(localStorage.getItem('workout_log') || '{}');
    const dayIdx = new Date().getDay();
    const today = todayStr();
    const workout = plan[dayIdx];
    const done = log[today] && log[today].done;

    if (!workout) { el.textContent = 'Nothing planned for today yet'; return; }
    el.textContent = 'Today: ' + workout + (done ? ' — done ✓' : '');
  } catch (e) {
    el.textContent = 'Weekly workout plan and log';
  }
}

function renderBacklogSnippet() {
  const el = document.getElementById('backlogSnippet');
  try {
    const state = JSON.parse(localStorage.getItem('backlog_progress') || '{}');
    const keys = Object.keys(state).filter(k => k.startsWith('play_'));
    const doneKeys = keys.filter(k => state[k]);
    if (!keys.length) { el.textContent = ''; return; }
    el.textContent = doneKeys.length + '/' + keys.length;
    el.style.color = '#60a5fa';
  } catch (e) {
    el.textContent = '';
  }
}

renderStreak();
renderCacheSnippet();
renderSplitSnippet();
renderBacklogSnippet();
</script>
</body>
</html>
