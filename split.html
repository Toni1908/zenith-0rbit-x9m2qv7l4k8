<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #080808;
    --surface: #101010;
    --border:  #1c1c1c;
    --text:    #e0e0e0;
    --muted:   #444;
    --accent:  #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px 60px;
  }
  .wrap { width: 100%; max-width: 460px; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    margin-bottom: 18px;
  }
  .back-link:hover { color: var(--text); }

  .header {
    text-align: center;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header-name {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: #fff;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .today-card {
    background: linear-gradient(180deg, #141414, #0f0f0f);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 26px;
  }
  .today-day { font-size: 12px; color: #888; letter-spacing: 0.5px; }
  .today-workout { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .today-btn {
    width: 100%;
    margin-top: 14px;
    padding: 11px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #161616;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
  }
  .today-btn.done {
    background: rgba(74,222,128,0.12);
    border-color: #4ade80;
    color: #4ade80;
  }
  .today-btn:hover { border-color: #333; }
  .today-btn.done:hover { border-color: #4ade80; }

  .plan-list { margin-bottom: 24px; }
  .plan-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .plan-row.is-today { border-color: #333; }
  .plan-day {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #777;
    width: 38px;
    flex-shrink: 0;
  }
  .plan-row.is-today .plan-day { color: var(--accent); }
  .plan-input {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
  }
  .plan-input:focus { outline: none; border-color: #444; }
  .plan-input::placeholder { color: #555; }

  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
  }
  .history-left { display: flex; flex-direction: column; }
  .history-date { font-size: 13px; font-weight: 500; }
  .history-workout { font-size: 11px; color: #777; margin-top: 1px; }
  .history-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #262626;
    flex-shrink: 0;
  }
  .history-dot.done { background: #4ade80; }

  .empty { text-align: center; color: #555; font-size: 12px; padding: 20px 0; }

  .save-note { font-size: 11px; color: #444; text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html">&#8592; Hub</a>

  <div class="header">
    <div class="header-eyebrow">Systems</div>
    <div class="header-name">Split</div>
  </div>

  <div class="today-card">
    <div class="today-day" id="todayDay">—</div>
    <div class="today-workout" id="todayWorkout">—</div>
    <button class="today-btn" id="todayBtn">Mark today done</button>
  </div>

  <div class="section-label">Weekly plan — tap to edit</div>
  <div class="plan-list" id="planList"></div>

  <div class="section-label">Last 14 days</div>
  <div class="history-list" id="historyList"></div>

  <div class="save-note">Saved automatically to this browser</div>
</div>

<script>
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const PLAN_KEY = 'workout_plan';
const LOG_KEY = 'workout_log';
const STREAK_KEY = 'hub_streak_days';

let plan = {};
let log = {};

function recordActivity() {
  try {
    const days = JSON.parse(localStorage.getItem(STREAK_KEY) || '[]');
    const today = new Date().toISOString().slice(0,10);
    if (days[days.length - 1] !== today) {
      days.push(today);
      localStorage.setItem(STREAK_KEY, JSON.stringify(days));
    }
  } catch (e) { /* non-critical */ }
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function loadData() {
  try {
    const rawPlan = localStorage.getItem(PLAN_KEY);
    plan = rawPlan ? JSON.parse(rawPlan) : {};
  } catch (e) { plan = {}; }
  try {
    const rawLog = localStorage.getItem(LOG_KEY);
    log = rawLog ? JSON.parse(rawLog) : {};
  } catch (e) { log = {}; }
}

function savePlan() {
  localStorage.setItem(PLAN_KEY, JSON.stringify(plan));
}
function saveLog() {
  localStorage.setItem(LOG_KEY, JSON.stringify(log));
}

function renderToday() {
  const now = new Date();
  const dayIdx = now.getDay();
  const dateKey = todayStr();
  const workoutName = plan[dayIdx] || '';

  document.getElementById('todayDay').textContent = DAY_NAMES[dayIdx] + ' · Today';
  document.getElementById('todayWorkout').textContent = workoutName || 'Nothing planned yet';

  const entry = log[dateKey];
  const btn = document.getElementById('todayBtn');
  const isDone = !!(entry && entry.done);
  btn.textContent = isDone ? 'Done ✓' : 'Mark today done';
  btn.className = 'today-btn' + (isDone ? ' done' : '');

  btn.onclick = () => {
    const nowDone = !(log[dateKey] && log[dateKey].done);
    log[dateKey] = { done: nowDone, workout: workoutName };
    saveLog();
    if (nowDone) recordActivity();
    renderToday();
    renderHistory();
  };
}

function renderPlan() {
  const container = document.getElementById('planList');
  container.innerHTML = '';
  const todayIdx = new Date().getDay();

  for (let i = 0; i < 7; i++) {
    const row = document.createElement('div');
    row.className = 'plan-row' + (i === todayIdx ? ' is-today' : '');
    row.innerHTML = `
      <div class="plan-day">${DAY_NAMES[i].slice(0,3)}</div>
      <input class="plan-input" type="text" placeholder="e.g. Biceps, Legs, Rest" value="${(plan[i] || '').replace(/"/g,'&quot;')}" data-day="${i}">
    `;
    container.appendChild(row);
  }

  container.querySelectorAll('.plan-input').forEach(input => {
    input.addEventListener('input', () => {
      const day = input.getAttribute('data-day');
      plan[day] = input.value;
      savePlan();
      if (Number(day) === todayIdx) renderToday();
    });
  });
}

function renderHistory() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';

  const days = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0,10));
  }

  const hasAny = days.some(d => log[d]);
  if (!hasAny) {
    container.innerHTML = '<div class="empty">No sessions logged yet.</div>';
    return;
  }

  days.forEach(dateKey => {
    const entry = log[dateKey];
    if (!entry) return;
    const d = new Date(dateKey + 'T00:00:00');
    const label = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `
      <div class="history-left">
        <div class="history-date">${label}</div>
        <div class="history-workout">${entry.workout || 'No workout set'}</div>
      </div>
      <div class="history-dot ${entry.done ? 'done' : ''}"></div>
    `;
    container.appendChild(row);
  });
}

(function init() {
  loadData();
  renderToday();
  renderPlan();
  renderHistory();
})();
</script>
</body>
</html>
