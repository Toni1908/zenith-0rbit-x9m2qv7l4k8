<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cache</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0a0a0a;
    color: #f2f2f2;
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;
  }
  .app { width: 100%; max-width: 460px; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    margin-bottom: 14px;
  }
  .back-link:hover { color: #f2f2f2; }

  .brand {
    text-align: center;
    margin-bottom: 22px;
  }
  .brand-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .brand-tag {
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .month-nav button {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #f2f2f2;
    width: 36px; height: 36px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .month-nav button:hover { background: #202020; }
  .month-nav button:disabled { opacity: 0.3; cursor: default; }
  .month-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  .month-sub { font-size: 12px; color: #8a8a8a; margin-top: 2px; }

  .balance-card {
    background: linear-gradient(180deg, #141414, #0f0f0f);
    border: 1px solid #262626;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  .balance-label { font-size: 12px; color: #8a8a8a; text-transform: uppercase; letter-spacing: 1px; }
  .balance-value { font-size: 30px; font-weight: 700; margin-top: 6px; }
  .balance-value.neg { color: #e2574f; }
  .balance-value.pos { color: #f2f2f2; }

  .stat-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat {
    flex: 1;
    background: #121212;
    border: 1px solid #232323;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: #8a8a8a; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 17px; font-weight: 600; margin-top: 4px; }
  .stat-value.credit { color: #4fd68c; }
  .stat-value.debit { color: #e2574f; }
  .stat-value.opening { color: #d9d9d9; }

  .section-label {
    font-size: 12px;
    color: #8a8a8a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0 0 10px 2px;
  }

  .chart-card {
    background: #121212;
    border: 1px solid #232323;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .chart-empty {
    text-align: center;
    color: #555;
    font-size: 12px;
    padding: 20px 0;
  }
  .chart-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .chart-row:last-child { margin-bottom: 0; }
  .chart-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chart-cat { font-size: 12px; width: 84px; flex-shrink: 0; color: #ccc; }
  .chart-track {
    flex: 1;
    height: 8px;
    background: #1c1c1c;
    border-radius: 4px;
    overflow: hidden;
  }
  .chart-fill { height: 100%; border-radius: 4px; }
  .chart-amount { font-size: 12px; color: #999; width: 76px; text-align: right; flex-shrink: 0; }

  .add-form {
    background: #121212;
    border: 1px solid #232323;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .type-btn {
    flex: 1;
    padding: 9px 0;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: #161616;
    color: #8a8a8a;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .type-btn.active-credit { background: rgba(79,214,140,0.12); border-color: #4fd68c; color: #4fd68c; }
  .type-btn.active-debit { background: rgba(226,87,79,0.12); border-color: #e2574f; color: #e2574f; }

  .add-form input, .add-form select {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #262626;
    border-radius: 8px;
    color: #f2f2f2;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .add-form select { appearance: none; -webkit-appearance: none; }
  .add-form input::placeholder { color: #666; }
  .add-form input:focus, .add-form select:focus { outline: none; border-color: #444; }

  .submit-btn {
    width: 100%;
    padding: 11px 0;
    border-radius: 8px;
    border: none;
    background: #f2f2f2;
    color: #0a0a0a;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
  }
  .submit-btn:hover { background: #dcdcdc; }

  .entries-label { font-size: 12px; color: #8a8a8a; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px 2px; }
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #121212;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .entry-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .entry-reason { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 190px; }
  .entry-meta { font-size: 11px; color: #777; display: flex; gap: 6px; align-items: center; }
  .entry-cat-tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .entry-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .entry-amount { font-size: 15px; font-weight: 600; }
  .entry-amount.credit { color: #4fd68c; }
  .entry-amount.debit { color: #e2574f; }
  .del-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
  }
  .del-btn:hover { color: #e2574f; }

  .empty {
    text-align: center;
    color: #666;
    font-size: 13px;
    padding: 30px 0;
  }

  .status { font-size: 11px; color: #555; text-align: center; margin-top: 20px; }

  .export-row { display: flex; gap: 8px; margin-top: 16px; }
  .export-row button {
    flex: 1;
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #8a8a8a;
    font-family: inherit;
    font-size: 12px;
    padding: 8px 0;
    border-radius: 8px;
    cursor: pointer;
  }
  .export-row button:hover { color: #f2f2f2; border-color: #444; }

  /* ===== shared polish ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  body { animation: fadeInUp 0.35s ease; }
  body {
    padding-top: calc(env(safe-area-inset-top, 0px));
    padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }
  * { scrollbar-width: thin; scrollbar-color: #262626 transparent; }

  button, a.card, .card {
    transition: transform 0.12s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.96); }
  a.card:active, .card:active { transform: scale(0.98); }

  .toast-wrap {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #eee;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { border-color: #e2574f; color: #f2a09c; }

</style>
</head>
<body>
<div class="app">

  <a class="back-link" href="index.html">&#8592; Hub</a>

  <div class="brand">
    <div class="brand-name">Cache</div>
    <div class="brand-tag">monthly ledger</div>
  </div>

  <div class="month-nav">
    <button id="prevBtn">&#8592;</button>
    <div style="text-align:center;">
      <div class="month-title" id="monthTitle">—</div>
      <div class="month-sub" id="monthSub"></div>
    </div>
    <button id="nextBtn">&#8594;</button>
  </div>

  <div class="balance-card">
    <div class="balance-label">Closing balance</div>
    <div class="balance-value" id="closingBalance">₹0.00</div>
  </div>

  <div class="stat-row">
    <div class="stat">
      <div class="stat-label">Opening</div>
      <div class="stat-value opening" id="openingStat">₹0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">In</div>
      <div class="stat-value credit" id="creditStat">₹0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Out</div>
      <div class="stat-value debit" id="debitStat">₹0.00</div>
    </div>
  </div>

  <div class="section-label">Spending by category</div>
  <div class="chart-card" id="chartCard"></div>

  <div class="add-form">
    <div class="type-toggle">
      <button class="type-btn active-credit" id="creditBtn" type="button">+ Credit</button>
      <button class="type-btn" id="debitBtn" type="button">− Debit</button>
    </div>
    <input type="number" id="amountInput" placeholder="Amount (e.g. 152.35)" inputmode="decimal" step="0.01">
    <select id="categoryInput">
      <option value="Food">Food</option>
      <option value="Fuel">Fuel</option>
      <option value="Salary">Salary</option>
      <option value="Bills">Bills</option>
      <option value="Other expenses">Other expenses</option>
    </select>
    <input type="text" id="reasonInput" placeholder="Reason (e.g. groceries, petrol)">
    <input type="date" id="dateInput">
    <button class="submit-btn" id="addBtn">Add entry</button>
  </div>

  <div class="entries-label">Entries this month</div>
  <div id="entriesList"></div>

  <div class="export-row">
    <button id="exportBtn">Export backup</button>
    <button id="importBtn">Import backup</button>
  </div>
  <input type="file" id="importFile" accept="application/json" style="display:none;">

  <div class="status" id="statusMsg"></div>
</div>

<script>
function showToast(msg, isError) {
  let wrap = document.getElementById('toastWrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'toastWrap';
    wrap.className = 'toast-wrap';
    document.body.appendChild(wrap);
  }
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' err' : '');
  t.textContent = msg;
  wrap.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 250);
  }, 1700);
}

let allEntries = [];
let currentType = 'credit';
let viewYear, viewMonth; // viewMonth 0-indexed

const STORAGE_KEY = 'cache_entries';
const SETTINGS_KEY = 'hub_settings';
const STREAK_KEY = 'hub_streak_days';

let CURRENCY = '₹';
let CATEGORIES = ['Food', 'Fuel', 'Salary', 'Bills', 'Other expenses'];
let CATEGORY_COLORS = {
  'Food': '#e29e4f',
  'Fuel': '#4fb2e2',
  'Salary': '#4fd68c',
  'Bills': '#e2574f',
  'Other expenses': '#8a8a8a'
};

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.currency) CURRENCY = s.currency;
    if (s.categories && s.categories.length) {
      CATEGORIES = s.categories.map(c => c.name);
      CATEGORY_COLORS = {};
      s.categories.forEach(c => { CATEGORY_COLORS[c.name] = c.color; });
    }
  } catch (e) { /* keep defaults */ }
}

function populateCategoryOptions() {
  const select = document.getElementById('categoryInput');
  select.innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
}

function recordActivity() {
  try {
    const days = JSON.parse(localStorage.getItem(STREAK_KEY) || '[]');
    const today = new Date().toISOString().slice(0,10);
    if (days[days.length - 1] !== today) {
      days.push(today);
      localStorage.setItem(STREAK_KEY, JSON.stringify(days));
    }
  } catch (e) { /* non-critical */ }
}

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function fmtMoney(n) {
  const sign = n < 0 ? '−' : '';
  const rounded = Math.abs(Math.round(n * 100) / 100);
  return sign + CURRENCY + rounded.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

let balanceAnimFrame = null;
function animateBalance(el, target) {
  const startText = el.getAttribute('data-raw');
  const start = startText !== null ? parseFloat(startText) : target;
  el.setAttribute('data-raw', target);

  if (balanceAnimFrame) cancelAnimationFrame(balanceAnimFrame);
  const duration = 400;
  const startTime = performance.now();

  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = start + (target - start) * eased;
    el.textContent = fmtMoney(current);
    if (progress < 1) {
      balanceAnimFrame = requestAnimationFrame(step);
    }
  }
  balanceAnimFrame = requestAnimationFrame(step);
}

function monthKey(y, m) {
  return y + '-' + String(m+1).padStart(2,'0');
}

function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    allEntries = raw ? JSON.parse(raw) : [];
  } catch (e) {
    allEntries = [];
  }
}

function saveEntries() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allEntries));
    recordActivity();
    setStatus('Saved');
  } catch (e) {
    setStatus('Save failed — storage unavailable');
  }
}

function setStatus(msg) {
  if (msg === 'Saved') return; // silent success on every keystroke-save; only show meaningful events
  const isError = /fail|invalid|could not|enter a valid/i.test(msg);
  showToast(msg, isError);
}

function entriesForMonth(y, m) {
  const key = monthKey(y, m);
  return allEntries.filter(e => e.date.slice(0,7) === key);
}

function openingBalanceFor(y, m) {
  const cutoff = monthKey(y, m);
  let sum = 0;
  for (const e of allEntries) {
    if (e.date.slice(0,7) < cutoff) {
      sum += e.type === 'credit' ? e.amount : -e.amount;
    }
  }
  return sum;
}

function renderChart(monthEntries) {
  const card = document.getElementById('chartCard');
  const debits = monthEntries.filter(e => e.type === 'debit');

  if (debits.length === 0) {
    card.innerHTML = '<div class="chart-empty">Nothing spent yet this month — the chart fills in as you log expenses.</div>';
    return;
  }

  const totals = {};
  debits.forEach(e => {
    const cat = e.category || 'Other expenses';
    totals[cat] = (totals[cat] || 0) + e.amount;
  });

  const maxVal = Math.max(...Object.values(totals));
  const rows = Object.entries(totals)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, amt]) => {
      const color = CATEGORY_COLORS[cat] || '#8a8a8a';
      const pct = maxVal > 0 ? (amt / maxVal) * 100 : 0;
      return `
        <div class="chart-row">
          <div class="chart-dot" style="background:${color}"></div>
          <div class="chart-cat">${cat}</div>
          <div class="chart-track"><div class="chart-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
          <div class="chart-amount">${fmtMoney(amt)}</div>
        </div>
      `;
    }).join('');

  card.innerHTML = rows;
}

function render() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthTitle').textContent = monthNames[viewMonth] + ' ' + viewYear;

  const monthEntries = entriesForMonth(viewYear, viewMonth).sort((a,b) => a.date.localeCompare(b.date));
  const opening = openingBalanceFor(viewYear, viewMonth);
  let credit = 0, debit = 0;
  for (const e of monthEntries) {
    if (e.type === 'credit') credit += e.amount; else debit += e.amount;
  }
  const closing = opening + credit - debit;

  document.getElementById('monthSub').textContent = monthEntries.length + (monthEntries.length === 1 ? ' entry' : ' entries');
  document.getElementById('openingStat').textContent = fmtMoney(opening);
  document.getElementById('creditStat').textContent = fmtMoney(credit);
  document.getElementById('debitStat').textContent = fmtMoney(debit);

  const closingEl = document.getElementById('closingBalance');
  animateBalance(closingEl, closing);
  closingEl.className = 'balance-value ' + (closing < 0 ? 'neg' : 'pos');

  const now = new Date();
  const isCurrentOrFuture = (viewYear > now.getFullYear()) ||
    (viewYear === now.getFullYear() && viewMonth >= now.getMonth());
  document.getElementById('nextBtn').disabled = isCurrentOrFuture;

  renderChart(monthEntries);

  const list = document.getElementById('entriesList');
  list.innerHTML = '';
  if (monthEntries.length === 0) {
    list.innerHTML = '<div class="empty">A clean slate — add your first entry for this month above.</div>';
    return;
  }
  for (const e of [...monthEntries].reverse()) {
    const row = document.createElement('div');
    row.className = 'entry';
    const d = new Date(e.date + 'T00:00:00');
    const dateLabel = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    const cat = e.category || 'Other expenses';
    const catColor = CATEGORY_COLORS[cat] || '#8a8a8a';
    row.innerHTML = `
      <div class="entry-left">
        <div class="entry-reason">${escapeHtml(e.reason || cat)}</div>
        <div class="entry-meta">
          <span class="entry-cat-tag" style="background:${catColor}22;color:${catColor}">${cat}</span>
          <span>${dateLabel}</span>
        </div>
      </div>
      <div class="entry-right">
        <div class="entry-amount ${e.type}">${e.type === 'credit' ? '+' : '−'}${fmtMoney(e.amount)}</div>
        <button class="del-btn" data-id="${e.id}">✕</button>
      </div>
    `;
    list.appendChild(row);
  }
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-id');
      allEntries = allEntries.filter(e => e.id !== id);
      saveEntries();
      render();
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('creditBtn').addEventListener('click', () => {
  currentType = 'credit';
  document.getElementById('creditBtn').classList.add('active-credit');
  document.getElementById('debitBtn').classList.remove('active-debit');
});
document.getElementById('debitBtn').addEventListener('click', () => {
  currentType = 'debit';
  document.getElementById('debitBtn').classList.add('active-debit');
  document.getElementById('creditBtn').classList.remove('active-credit');
});

document.getElementById('addBtn').addEventListener('click', () => {
  const amountInput = document.getElementById('amountInput');
  const reasonInput = document.getElementById('reasonInput');
  const dateInput = document.getElementById('dateInput');
  const categoryInput = document.getElementById('categoryInput');

  const amount = Math.round(parseFloat(amountInput.value) * 100) / 100;
  if (!amount || amount <= 0) { setStatus('Enter a valid amount'); return; }
  const date = dateInput.value || todayStr();
  const reason = reasonInput.value.trim();
  const category = categoryInput.value;

  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    amount, reason, type: currentType, date, category
  };
  allEntries.push(entry);
  saveEntries();

  amountInput.value = '';
  reasonInput.value = '';

  const [y, m] = date.split('-').map(Number);
  viewYear = y; viewMonth = m - 1;

  render();
  showToast((currentType === 'credit' ? '+' : '−') + fmtMoney(amount).replace(/^[+−]?/, '') + ' logged');
});

document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(allEntries, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cache-backup-' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (Array.isArray(imported)) {
        allEntries = imported;
        saveEntries();
        render();
        setStatus('Backup imported');
      } else {
        setStatus('Invalid backup file');
      }
    } catch (e) {
      setStatus('Could not read file');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
});

(function init() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  document.getElementById('dateInput').value = todayStr();
  loadSettings();
  populateCategoryOptions();
  loadEntries();
  render();
})();
</script>
</body>
